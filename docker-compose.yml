version: "3.8"

services:
  backend:
    build: ./backend
    container_name: zetheta-admin-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/zetheta_admin.db
      - TARGET_URL_TECH=http://13.127.165.204:8000/api/zetheta/analyze
      - TARGET_URL_NONTECH=http://13.127.165.204:8000/api/v2/zetheta/analyze/document
      - SOURCE_URL_TECH=https://www.zetheta.com/wp-json/v1/submissions
      - SOURCE_URL_NONTECH=https://www.zetheta.com/wp-json/v1/submissions/?type=nontech
      - CORS_ORIGINS=http://localhost,http://localhost:80
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: zetheta-admin-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
